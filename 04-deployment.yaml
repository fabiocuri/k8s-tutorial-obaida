# A Deployment manages a set of identical pods (replicas).
# It handles rolling updates, rollbacks, and self-healing.
# If a pod crashes, the Deployment automatically creates a new one.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: litellm
  labels:
    app: litellm
spec:
  # How many identical pods to run.
  # Try changing this: kubectl scale deployment litellm -n litellm --replicas=5
  replicas: 2

  # The Deployment uses this selector to find which pods it owns.
  # It must match the labels in the pod template below.
  selector:
    matchLabels:
      app: litellm

  # Strategy for rolling updates
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # max extra pods during update
      maxUnavailable: 0   # never have fewer than 'replicas' running

  # Pod template — the blueprint for each replica
  template:
    metadata:
      labels:
        app: litellm    # must match selector above
    spec:
      containers:
        - name: litellm
          image: docker.litellm.ai/berriai/litellm:main-stable
          imagePullPolicy: Always

          # Container port (for documentation & service targeting)
          ports:
            - containerPort: 4000
              name: http

          # Environment variables — pulled from our Secret
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: OPENAI_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: ANTHROPIC_API_KEY
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: LITELLM_MASTER_KEY

          # Pass the config file path as a CLI argument
          args:
            - "--config"
            - "/app/proxy_config.yaml"

          # Mount the ConfigMap as a file inside the container
          volumeMounts:
            - name: config-volume
              mountPath: /app/proxy_config.yaml
              subPath: config.yaml
              readOnly: true

          # Resource requests and limits
          # requests = guaranteed minimum (used for scheduling)
          # limits   = hard ceiling (pod gets killed if it exceeds memory limit)
          resources:
            requests:
              cpu: "250m"       # 0.25 CPU cores
              memory: "256Mi"   # 256 MiB RAM
            limits:
              cpu: "1000m"      # 1 CPU core
              memory: "1Gi"     # 1 GiB RAM

          # Liveness probe — if this fails, K8s RESTARTS the pod
          # "Is the process alive and not deadlocked?"
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 3

          # Readiness probe — if this fails, K8s STOPS sending traffic to this pod
          # "Is the pod ready to handle requests?"
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 3

      # Volumes define what's available to mount
      volumes:
        - name: config-volume
          configMap:
            name: litellm-config
