# A Secret stores sensitive data (passwords, API keys, tokens).
# Values must be base64-encoded. In practice, use external secret managers
# (e.g., AWS Secrets Manager, Vault) instead of committing secrets to git.
#
# To encode a value: echo -n "your-value" | base64
# To decode a value: echo "eW91ci12YWx1ZQ==" | base64 -d

apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: litellm-secrets
  namespace: litellm
data:
  # These are dummy values — replace with your own base64-encoded keys
  # "sk-master-1234"
  LITELLM_MASTER_KEY: c2stbWFzdGVyLTEyMzQ=
